services:
  db:
    image: docker.io/library/postgres:15
    container_name: d08_postgres
    environment:
      POSTGRES_DB: d08_db
      POSTGRES_USER: d08_user
      POSTGRES_PASSWORD: d08_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
