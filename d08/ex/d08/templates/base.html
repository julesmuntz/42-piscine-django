<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>{% block title %}{{ title|default:default_title }}{% endblock %}</title>
	<link
		rel="stylesheet"
		href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
	/>
	<style>
		html,
		body,
		* {
			scrollbar-width: none;
			-ms-overflow-style: none;
		}

		*::-webkit-scrollbar {
			display: none;
		}

		a:focus,
		a:focus-visible,
		button:focus,
		button:focus-visible,
		input:focus,
		input:focus-visible,
		textarea:focus,
		textarea:focus-visible,
		select:focus,
		select:focus-visible,
		.btn:focus,
		.btn:focus-visible,
		.form-control:focus,
		.form-control:focus-visible {
			outline: none !important;
			box-shadow: none !important;
		}

		body {
			background: #f2f2f7;
			color: #1c1c1e;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		}

		.app-shell {
			padding-top: 18px;
		}

		.app-section-hidden {
			display: none !important;
		}

		.ios-navbar {
			margin-bottom: 18px;
			border: 1px solid rgba(60, 60, 67, 0.16);
			border-radius: 24px;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: saturate(180%) blur(16px);
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
		}

		.ios-navbar .container-fluid {
			padding: 10px 14px;
		}

		.ios-navbar .nav.navbar-nav {
			margin: 0;
		}

		.ios-navbar .navbar-nav > li > a {
			margin: 0;
			padding: 8px 14px;
			border-radius: 999px;
			color: #007aff;
			font-size: 14px;
			font-weight: 600;
		}

		.ios-navbar .navbar-nav > li > button.ios-nav-btn,
		.ios-navbar .navbar-nav > li > form > button.ios-nav-btn {
			margin: 0;
			padding: 8px 14px;
			border: none;
			border-radius: 999px;
			background: transparent;
			color: #007aff;
			font-size: 14px;
			font-weight: 600;
		}

		.ios-navbar .navbar-nav > li > .ios-nav-text {
			display: block;
			margin: 0;
			padding: 8px 14px;
			border-radius: 999px;
			font-size: 14px;
			font-weight: 600;
			color: inherit;
		}

		.ios-navbar .navbar-nav > li + li {
			margin-left: 6px;
		}

		.ios-navbar .navbar-nav > li > a:hover,
		.ios-navbar .navbar-nav > li > a:focus,
		.ios-navbar .navbar-nav > li > button.ios-nav-btn:hover,
		.ios-navbar .navbar-nav > li > button.ios-nav-btn:focus,
		.ios-navbar .navbar-nav > li > form > button.ios-nav-btn:hover,
		.ios-navbar .navbar-nav > li > form > button.ios-nav-btn:focus {
			background: rgba(0, 122, 255, 0.12);
			color: #007aff;
		}

		.ios-navbar .navbar-nav > .active > a,
		.ios-navbar .navbar-nav > .active > a:hover,
		.ios-navbar .navbar-nav > .active > a:focus {
			background: #007aff;
			color: #fff;
		}

		.ios-navbar .navbar-nav > li > button.ios-nav-btn.ios-nav-btn-danger,
		.ios-navbar .navbar-nav > li > form > button.ios-nav-btn.ios-nav-btn-danger {
			color: #ff3b30;
		}

		.ios-navbar .navbar-nav > li > button.ios-nav-btn.ios-nav-btn-danger:hover,
		.ios-navbar .navbar-nav > li > button.ios-nav-btn.ios-nav-btn-danger:focus,
		.ios-navbar .navbar-nav > li > form > button.ios-nav-btn.ios-nav-btn-danger:hover,
		.ios-navbar .navbar-nav > li > form > button.ios-nav-btn.ios-nav-btn-danger:focus {
			background: rgba(255, 59, 48, 0.12);
			color: #ff3b30;
		}

		.ios-navbar .navbar-nav.navbar-right > li > form {
			margin: 0;
		}

		.ios-navbar .navbar-nav.navbar-right > li > form > button {
			margin: 0;
		}

		@media (max-width: 767px) {
			.ios-navbar .navbar-nav {
				margin: 0;
			}

			.ios-navbar .navbar-nav > li {
				width: 100%;
			}

			.ios-navbar .navbar-nav > li + li {
				margin-left: 0;
			}

			.ios-navbar .navbar-nav.navbar-right > li,
			.ios-navbar .navbar-nav.navbar-right > li > form {
				width: 100%;
			}

			.ios-navbar .navbar-nav > li > a,
			.ios-navbar .navbar-nav > li > .ios-nav-text,
			.ios-navbar .navbar-nav.navbar-right > li > form > button.ios-nav-btn {
				display: block;
				width: 100%;
				box-sizing: border-box;
				text-align: left;
			}
		}
	</style>
	{% block header %}{% endblock %}
	<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
</head>
<body>
	<div class="container app-shell">
		{% with current_url_name=request.resolver_match.url_name %}
		<nav class="navbar ios-navbar" role="navigation">
			<div class="container-fluid">
				<ul id="nav-main" class="nav navbar-nav">
					<li{% if current_url_name == 'account' %} class="active"{% endif %}>
						<a href="{% url 'account' %}" data-app-view="account">Account</a>
					</li>
					<li>
						<a href="{% url 'account' %}" data-app-view="chatrooms">Chat</a>
					</li>
				</ul>
				<ul id="nav-user" class="nav navbar-nav navbar-right{% if not user.is_authenticated %} app-section-hidden{% endif %}">
					<li>
						<span id="nav-username" class="ios-nav-text">{{ user.username }}</span>
					</li>
					<li>
						<form id="logout-form" method="post" action="{% url 'account' %}">
							{% csrf_token %}
							<input type="hidden" name="action" value="logout" />
							<button type="submit" class="ios-nav-btn ios-nav-btn-danger">Logout</button>
						</form>
					</li>
				</ul>
			</div>
		</nav>
		{% endwith %}
		{% block content %}{% endblock %}
	</div>
	{% block javascript %}{% endblock %}
</body>
</html>
