{% extends 'd06/templates/base.html' %}

{% block content %}
    <h1>{{ title }}</h1>
    <ul>
        {% for tip in tips %}
            <li>{{ tip.content }}</li>
            <p>By {{ tip.author.username }} on {{ tip.date }}</p>
        {% endfor %}
    </ul>
    <div class="nav-link-container">
        <div class="nav-link">
            <a href="/">Return to Home</a>
        </div>
    </div>
{% endblock %}
